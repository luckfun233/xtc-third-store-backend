name: rebuild-index

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "apps/**/*.json"
      - "packages/**/*.rpk"
      - "scripts/build_index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    env:
      DEFAULT_STORE_BASE_URL: https://store.1357924680liu.dpdns.org
      STORE_BASE_URL: ${{ vars.STORE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build index.json
        run: |
          python scripts/build_index.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" --site-base "${STORE_BASE_URL:-$DEFAULT_STORE_BASE_URL}"

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain data/index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/index.json
            git commit -m "chore(data): auto update index.json"
            git push
          else
            echo "No changes in data/index.json"
          fi
